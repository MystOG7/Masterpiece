<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VirtualArtGallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lora:ital,wght@0,400;0,500;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
    --midnight: #0a0e27; --deep-blue: #0f1538; --navy: #1a237e;
    --royal-blue: #283593; --azure: #3949ab; --sky-blue: #5c6bc0;
    --pale-blue: #9fa8da; --silver: #c5cae9; --moon-glow: #fff9c4;
    --star-gold: #ffd54f; --warm-gold: #ffca28; --amber: #ff8f00;
}
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #02040a 0%, #0a0e27 15%, #0f1538 35%, #1a237e 60%, #0f1538 85%, #02040a 100%);
    background-attachment: fixed; color: #e8eaf6;
    min-height: 100vh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
}
.starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--duration) infinite ease-in-out; opacity: var(--opacity); }
.star.bright { box-shadow: 0 0 6px 2px rgba(255,255,255,0.6), 0 0 12px 4px rgba(255,215,79,0.3); }
.star.golden { background: var(--star-gold); box-shadow: 0 0 8px 2px rgba(255,213,79,0.5), 0 0 16px 4px rgba(255,213,79,0.2); }
@keyframes twinkle { 0%, 100% { opacity: var(--opacity); transform: scale(1); } 50% { opacity: calc(var(--opacity) * 2); transform: scale(1.3); } }
.moon-container { position: fixed; top: 8%; right: 10%; z-index: 1; pointer-events: none; }
.moon {
    width: 100px; height: 100px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde7, #fff9c4 40%, #ffd54f 100%);
    box-shadow: 0 0 40px 10px rgba(255,249,196,0.3), 0 0 80px 20px rgba(255,213,79,0.15), inset -10px -10px 20px rgba(255,167,38,0.2);
    animation: moonPulse 4s ease-in-out infinite;
}
@keyframes moonPulse {
    0%, 100% { box-shadow: 0 0 40px 10px rgba(255,249,196,0.3), 0 0 80px 20px rgba(255,213,79,0.15); }
    50% { box-shadow: 0 0 60px 15px rgba(255,249,196,0.4), 0 0 100px 30px rgba(255,213,79,0.2); }
}
.hills { position: fixed; bottom: 0; left: 0; width: 100%; height: 200px; pointer-events: none; z-index: 1; opacity: 0.25; }
.hill { position: absolute; bottom: 0; border-radius: 100% 100% 0 0; background: linear-gradient(180deg, rgba(13,51,24,0.4), rgba(2,4,10,0.8)); }
.hill:nth-child(1) { width: 60%; height: 120px; left: -10%; }
.hill:nth-child(2) { width: 50%; height: 80px; right: -5%; }
.hill:nth-child(3) { width: 40%; height: 60px; left: 30%; }
header { position: relative; z-index: 10; text-align: center; padding: 70px 20px 40px; overflow: hidden; }
h1 {
    font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; margin-bottom: 12px;
    background: linear-gradient(135deg, #fff 0%, #fff9c4 20%, #ffd54f 40%, #fff 60%, #c5cae9 80%, #fff 100%);
    background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: 6px; text-transform: uppercase; animation: shimmerText 5s linear infinite;
}
@keyframes shimmerText { 0% { background-position: 0% center; } 100% { background-position: 300% center; } }
.subtitle { font-family: 'Lora', serif; font-size: clamp(0.9rem, 2.5vw, 1.2rem); color: #9fa8da; font-style: italic; letter-spacing: 5px; text-transform: uppercase; }
.divider { width: 100px; height: 2px; background: linear-gradient(90deg, transparent, #ffd54f, #3949ab, transparent); margin: 25px auto; border-radius: 2px; }
.art-count { font-size: 0.85rem; color: #9fa8da; opacity: 0.8; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }
.admin-bar {
    position: fixed; top: 0; left: 0; right: 0; background: rgba(2,4,10,0.95); backdrop-filter: blur(20px);
    z-index: 200; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid rgba(57,73,171,0.2); transform: translateY(-100%); transition: transform 0.4s ease;
}
.admin-bar.visible { transform: translateY(0); }
.admin-bar-title { font-family: 'Cinzel', serif; font-size: 0.85rem; color: #ffd54f; letter-spacing: 3px; text-transform: uppercase; }
.admin-bar-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.admin-btn {
    padding: 8px 16px; border-radius: 20px; font-family: 'Poppins', sans-serif; font-size: 0.75rem;
    font-weight: 500; cursor: pointer; transition: all 0.3s ease; border: none; letter-spacing: 1px; text-transform: uppercase;
}
.admin-btn.add { background: linear-gradient(135deg, #3949ab, #1a237e); color: white; }
.admin-btn.settings { background: rgba(57,73,171,0.2); color: #ffd54f; border: 1px solid rgba(255,213,79,0.3); }
.admin-btn.logout { background: transparent; color: #ef5350; border: 1px solid rgba(239,83,80,0.4); }
.card-admin-controls { position: absolute; top: 10px; left: 10px; z-index: 10; display: none; gap: 8px; }
body.admin-mode .card-admin-controls { display: flex; }
.card-btn {
    background: rgba(10,14,39,0.9); border: 1px solid #ffd54f; color: #ffd54f;
    width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; backdrop-filter: blur(5px);
}
.card-btn.delete { border-color: #ef5350; color: #ef5350; }
.card-btn:hover { transform: scale(1.1); }
.overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(2,4,10,0.95);
    backdrop-filter: blur(20px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px; overflow-y: auto;
}
.overlay.active { display: flex; }
.modal-box {
    background: linear-gradient(145deg, rgba(26,35,126,0.3), rgba(10,14,39,0.6));
    border-radius: 24px; padding: 40px; width: 100%; max-width: 500px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(57,73,171,0.3);
    border: 1px solid rgba(57,73,171,0.2); max-height: 90vh; overflow-y: auto;
}
.modal-box h2 { font-family: 'Cinzel', serif; font-size: 1.5rem; color: #ffd54f; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 0.8rem; color: #9fa8da; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 12px 16px; background: rgba(10,14,39,0.6); border: 1px solid rgba(57,73,171,0.3);
    border-radius: 12px; color: white; font-family: 'Poppins', sans-serif; font-size: 0.9rem;
}
.form-group textarea { min-height: 80px; resize: vertical; }
.modal-actions { display: flex; gap: 12px; margin-top: 24px; }
.modal-actions .btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; text-transform: uppercase; }
.btn.save { background: linear-gradient(135deg, #3949ab, #1a237e); color: white; }
.btn.cancel { background: transparent; color: #9fa8da; border: 1px solid rgba(57,73,171,0.4); }
.btn.danger { background: rgba(239,83,80,0.2); color: #ef5350; border: 1px solid rgba(239,83,80,0.4); }
.cat-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;}
.cat-item { display: flex; justify-content: space-between; background: rgba(10,14,39,0.6); padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(57,73,171,0.3);}
.cat-delete { color: #ef5350; cursor: pointer; font-weight: bold; background: none; border: none;}
.nav-container {
    position: sticky; top: 0; z-index: 100; background: rgba(10, 14, 39, 0.85); backdrop-filter: blur(20px);
    padding: 14px 10px; border-bottom: 1px solid rgba(57,73,171,0.2); overflow-x: auto; scrollbar-width: none;
}
.nav-tabs { display: flex; gap: 10px; min-width: max-content; justify-content: flex-start; padding: 0 10px; margin: 0 auto; max-width: 1200px; }
.nav-tab {
    padding: 10px 24px; border: 1px solid rgba(57,73,171,0.3); background: transparent; color: #9fa8da;
    border-radius: 30px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s ease; text-transform: uppercase;
}
.nav-tab.active { background: linear-gradient(135deg, #3949ab, #1a237e); color: white; border-color: transparent; box-shadow: 0 0 20px rgba(57,73,171,0.5); }
main { position: relative; z-index: 5; max-width: 1400px; margin: 0 auto; padding: 40px 15px 60px; }
.category-section { display: none; animation: fadeInUp 0.8s ease; }
.category-section.active { display: block; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
.category-title { font-family: 'Cinzel', serif; font-size: 2rem; color: #ffd54f; text-align: center; margin-bottom: 30px; letter-spacing: 3px; text-transform: uppercase; }
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 28px; }
.art-card {
    background: rgba(10,14,39,0.5); border-radius: 12px; overflow: hidden; position: relative;
    border: 1px solid rgba(57,73,171,0.15); transition: all 0.3s ease; cursor: pointer;
}
.art-card:hover { transform: translateY(-5px); border-color: rgba(57,73,171,0.5); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
.art-image-container { position: relative; aspect-ratio: 4/5; background: rgba(10,14,39,0.8); }
.art-image { width: 100%; height: 100%; object-fit: cover; }
.art-content { padding: 20px; background: rgba(10,14,39,0.8); border-top: 1px solid rgba(57,73,171,0.2); }
.art-title { font-family: 'Cinzel', serif; color: #fff; font-size: 1.1rem; margin-bottom: 5px; }
.art-subtitle { color: #9fa8da; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
.lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2,4,10,0.98); z-index: 2000; justify-content: center; align-items: center; }
.lightbox.active { display: flex; }
.lightbox-img-wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.lightbox-img { max-width: 95%; max-height: 90vh; object-fit: contain; border-radius: 8px; box-shadow: 0 0 50px rgba(57,73,171,0.2); }
.lightbox-close { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 2rem; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; z-index: 2001; }
.lightbox-info { position: absolute; bottom: 30px; background: rgba(10,14,39,0.8); padding: 15px 30px; border-radius: 30px; border: 1px solid rgba(57,73,171,0.3); text-align: center;}
.lightbox-info h3 { font-family: 'Cinzel', serif; color: #ffd54f; margin-bottom: 5px;}
.lightbox-info p { color: #9fa8da; font-size: 0.8rem; }
footer { text-align: center; padding: 50px 20px; border-top: 1px solid rgba(57,73,171,0.15); }
.footer-text { font-family: 'Lora', serif; color: #5c6bc0; font-style: italic; margin-bottom: 10px;}
.footer-sub { color: #9fa8da; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;}
@media (max-width: 768px) {
    .admin-bar { flex-direction: column; gap: 10px; }
    .lightbox-info { bottom: 10px; width: 90%; }
}
</style>
</head>
<body>
<div class="admin-bar" id="adminBar">
    <span class="admin-bar-title">✦ Owner Panel</span>
    <div class="admin-bar-actions">
        <button class="admin-btn add" onclick="openArtModal()">+ Add Art</button>
        <button class="admin-btn settings" onclick="openCatModal()">Categories</button>
        <button class="admin-btn settings" onclick="openSettingsModal()">Site Settings</button>
        <button class="admin-btn logout" onclick="logout()">Logout</button>
    </div>
</div>
<div class="overlay" id="loginOverlay">
    <div class="modal-box">
        <h2>Owner Access</h2>
        <div class="form-group"><label>Username</label><input type="text" id="loginUser"></div>
        <div class="form-group"><label>Password</label><input type="password" id="loginPass"></div>
        <button class="btn save" style="width:100%; padding:15px;" onclick="attemptLogin()">Sign In</button>
        <p class="login-error" id="loginError" style="color: #ef5350; font-size: 0.8rem; text-align: center; margin-top: 12px; display: none;">Invalid credentials.</p>
    </div>
</div>
<div class="overlay" id="settingsOverlay">
    <div class="modal-box">
        <h2>Site Settings</h2>
        <div class="form-group"><label>Main Title</label><input type="text" id="setSiteTitle"></div>
        <div class="form-group"><label>Subtitle</label><input type="text" id="setSiteSub"></div>
        <div class="form-group"><label>Footer Quote</label><textarea id="setSiteQuote"></textarea></div>
        <div class="form-group"><label>Footer Subtext</label><input type="text" id="setSiteFooter"></div>
        <div class="modal-actions">
            <button class="btn cancel" onclick="closeModals()">Cancel</button>
            <button class="btn save" onclick="saveSiteSettings()">Save</button>
        </div>
        <button class="btn danger" style="width:100%; margin-top:15px; padding:10px;" onclick="factoryReset()">Reset Website to Default</button>
    </div>
</div>
<div class="overlay" id="catOverlay">
    <div class="modal-box">
        <h2>Manage Categories</h2>
        <div class="cat-list" id="catListDisplay"></div>
        <div class="form-group" style="margin-top: 20px; border-top: 1px solid rgba(57,73,171,0.3); padding-top: 20px;">
            <label>Add New Category</label>
            <input type="text" id="newCatInput" placeholder="Category Name">
            <button class="btn save" style="width:100%; margin-top:10px; padding:10px;" onclick="addCategory()">Add Category</button>
        </div>
        <div class="modal-actions"><button class="btn cancel" onclick="closeModals()">Close</button></div>
    </div>
</div>
<div class="overlay" id="artOverlay">
    <div class="modal-box">
        <h2 id="artModalTitle">Add Artwork</h2>
        <input type="hidden" id="editArtId" value="">
        <div class="form-group"><label>Title</label><input type="text" id="artTitle"></div>
        <div class="form-group"><label>Category</label><select id="artCategory"></select></div>
        <div class="form-group"><label>Description / Details</label><textarea id="artDesc"></textarea></div>
        <div class="form-group" style="border: 1px dashed rgba(57,73,171,0.5); padding: 15px; border-radius: 12px;">
            <label style="color:#ffd54f;">Image Source</label>
            <label style="font-size:0.7rem; margin-top:10px;">Option 1: Upload from Device</label>
            <input type="file" id="artFile" accept="image/*" style="padding: 5px; width: 100%;">
            <div style="text-align: center; margin: 10px 0; color: #9fa8da; font-size:0.8rem;">— OR —</div>
            <label style="font-size:0.7rem;">Option 2: Paste Image URL / File Name</label>
            <input type="text" id="artUrl" placeholder="https://... or image.jpg">
        </div>
        <div class="modal-actions">
            <button class="btn cancel" onclick="closeModals()">Cancel</button>
            <button class="btn save" onclick="saveArtwork()">Save Art</button>
        </div>
    </div>
</div>
<div class="starfield" id="starfield"></div>
<div class="moon-container"><div class="moon"></div></div>
<div class="hills"><div class="hill"></div><div class="hill"></div><div class="hill"></div></div>
<header>
    <h1 id="ui-site-title">ART GALLERY</h1>
    <p class="subtitle" id="ui-site-sub">A Curated Exhibition</p>
    <div class="divider"></div>
    <p class="art-count" id="headerCount">Loading...</p>
    <button class="admin-btn settings" style="margin-top:20px;" onclick="showLogin()" id="loginBtn">Owner Access</button>
</header>
<nav class="nav-container"><div class="nav-tabs" id="navTabsContainer"></div></nav>
<main id="gallery-main"></main>
<div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <div class="lightbox-img-wrapper" id="lightbox-wrapper" onclick="if(event.target === this) closeLightbox()">
        <img src="" alt="" class="lightbox-img" id="lightbox-img">
    </div>
    <div class="lightbox-info">
        <h3 id="lightbox-title"></h3>
        <p id="lightbox-category"></p>
    </div>
</div>
<footer>
    <p class="footer-text" id="ui-footer-quote">"For my part I know nothing with any certainty, but the sight of the stars makes me dream."</p>
    <p class="footer-sub" id="ui-footer-sub">Maintained & Curated with Passion</p>
</footer>

// Use v2 keys to force browser cache reset with the fixed image links
let siteData = JSON.parse(localStorage.getItem('ag_site_v2')) || { ...DEFAULT_SITE_DATA };
let categories = JSON.parse(localStorage.getItem('ag_cats_v2')) || [ ...DEFAULT_CATEGORIES ];
let artworks = JSON.parse(localStorage.getItem('ag_arts_v2')) || JSON.parse(JSON.stringify(DEFAULT_ARTWORKS));

function saveState() {
    localStorage.setItem('ag_site_v2', JSON.stringify(siteData));
    localStorage.setItem('ag_cats_v2', JSON.stringify(categories));
    localStorage.setItem('ag_arts_v2', JSON.stringify(artworks));
}

function init() { generateStars(); applySiteData(); buildInterface(); }

function applySiteData() {
    document.getElementById('ui-site-title').innerText = siteData.title;
    document.getElementById('ui-site-sub').innerText = siteData.subtitle;
    document.getElementById('ui-footer-quote').innerText = siteData.quote;
    document.getElementById('ui-footer-sub').innerText = siteData.footer;
    document.getElementById('headerCount').innerText = `${artworks.length} Works • Official Archive`;
}

function buildInterface() {
    const tabsHtml = `<button class="nav-tab active" data-category="all" onclick="switchTab('all')">All Artworks</button>` +
        categories.map(c => `<button class="nav-tab" data-category="${c}" onclick="switchTab('${c}')">${c}</button>`).join('');
    document.getElementById('navTabsContainer').innerHTML = tabsHtml;

    const main = document.getElementById('gallery-main');
    let sectionsHtml = `<section id="all" class="category-section active" data-category="all"><h2 class="category-title">Exhibition</h2><div class="gallery-grid">${buildCards(artworks)}</div></section>`;
    
    categories.forEach(c => {
        const filtered = artworks.filter(a => a.category === c);
        sectionsHtml += `<section id="${c}" class="category-section" data-category="${c}"><h2 class="category-title">${c}</h2><div class="gallery-grid">${buildCards(filtered)}</div></section>`;
    });
    main.innerHTML = sectionsHtml;

    const select = document.getElementById('artCategory');
    select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
}

function buildCards(arts) {
    return arts.map(art => `
        <div class="art-card">
            <div class="card-admin-controls">
                <button class="card-btn" onclick="openArtModal('${art.id}'); event.stopPropagation();">✎</button>
                <button class="card-btn delete" onclick="deleteArt('${art.id}'); event.stopPropagation();">✖</button>
            </div>
            <div class="art-image-container" onclick="openLightbox('${art.id}')">
                <img src="${art.src}" class="art-image" loading="lazy">
            </div>
            <div class="art-content" onclick="openLightbox('${art.id}')">
                <h3 class="art-title">${art.title}</h3>
                <p class="art-subtitle">${art.category}</p>
            </div>
        </div>`).join('');
}

function switchTab(cat) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.category-section').forEach(s => s.classList.remove('active'));
    document.querySelector(`.nav-tab[data-category="${cat}"]`).classList.add('active');
    document.querySelector(`.category-section[data-category="${cat}"]`).classList.add('active');
}

function showLogin() { document.getElementById('loginOverlay').classList.add('active'); }

function attemptLogin() {
    if (document.getElementById('loginUser').value === 'owner' && document.getElementById('loginPass').value === 'owner123') {
        document.body.classList.add('admin-mode');
        document.getElementById('adminBar').classList.add('visible');
        document.getElementById('loginBtn').style.display = 'none';
        closeModals();
    } else {
        document.getElementById('loginError').style.display = 'block';
    }
}

function logout() {
    document.body.classList.remove('admin-mode');
    document.getElementById('adminBar').classList.remove('visible');
    document.getElementById('loginBtn').style.display = 'inline-block';
}

function closeModals() {
    document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
    document.body.style.overflow = '';
    document.getElementById('loginError').style.display = 'none';
}

function openSettingsModal() {
    document.getElementById('setSiteTitle').value = siteData.title;
    document.getElementById('setSiteSub').value = siteData.subtitle;
    document.getElementById('setSiteQuote').value = siteData.quote;
    document.getElementById('setSiteFooter').value = siteData.footer;
    document.getElementById('settingsOverlay').classList.add('active');
}

function saveSiteSettings() {
    siteData.title = document.getElementById('setSiteTitle').value || "ART GALLERY";
    siteData.subtitle = document.getElementById('setSiteSub').value || "";
    siteData.quote = document.getElementById('setSiteQuote').value || "";
    siteData.footer = document.getElementById('setSiteFooter').value || "";
    saveState(); applySiteData(); closeModals();
}

function openCatModal() { renderCatList(); document.getElementById('catOverlay').classList.add('active'); }

function renderCatList() {
    document.getElementById('catListDisplay').innerHTML = categories.map((c, i) => `
        <div class="cat-item"><span>${c}</span><button class="cat-delete" onclick="deleteCategory(${i})">✖ Delete</button></div>`).join('');
}

function addCategory() {
    const val = document.getElementById('newCatInput').value.trim();
    if(val && !categories.includes(val)) {
        categories.push(val); saveState(); buildInterface(); renderCatList();
        document.getElementById('newCatInput').value = '';
    }
}

function deleteCategory(index) {
    const cat = categories[index];
    if(confirm(`Delete category "${cat}"? Artworks will be marked "Uncategorized".`)) {
        categories.splice(index, 1);
        artworks.forEach(a => { if(a.category === cat) a.category = "Uncategorized"; });
        if(!categories.includes("Uncategorized")) categories.push("Uncategorized");
        saveState(); buildInterface(); renderCatList();
    }
}

let currentFileBase64 = null;
document.getElementById('artFile').addEventListener('change', function(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = function(event) {
        currentFileBase64 = event.target.result;
        document.getElementById('artUrl').value = "Image loaded from device ✓";
    };
    reader.readAsDataURL(file);
});

function openArtModal(id = null) {
    currentFileBase64 = null;
    document.getElementById('artFile').value = '';
    if(id) {
        document.getElementById('artModalTitle').innerText = "Edit Artwork";
        const art = artworks.find(a => a.id === id);
        document.getElementById('editArtId').value = id;
        document.getElementById('artTitle').value = art.title;
        document.getElementById('artCategory').value = art.category;
        document.getElementById('artDesc').value = art.desc || "";
        document.getElementById('artUrl').value = art.src;
    } else {
        document.getElementById('artModalTitle').innerText = "Add Artwork";
        document.getElementById('editArtId').value = "";
        document.getElementById('artTitle').value = "";
        document.getElementById('artDesc').value = "";
        document.getElementById('artUrl').value = "";
    }
    document.getElementById('artOverlay').classList.add('active');
}

function saveArtwork() {
    const id = document.getElementById('editArtId').value;
    const title = document.getElementById('artTitle').value.trim() || "Untitled";
    const cat = document.getElementById('artCategory').value;
    const desc = document.getElementById('artDesc').value;
    let src = document.getElementById('artUrl').value.trim();
    
    if(currentFileBase64) src = currentFileBase64;
    if(!src) return alert("Please provide an image URL or upload a file.");
    
    if(id) {
        const index = artworks.findIndex(a => a.id === id);
        artworks[index] = { ...artworks[index], title, category: cat, desc, src };
    } else {
        artworks.push({ id: 'art_' + Date.now(), title, category: cat, desc, src });
    }
    
    try {
        saveState(); buildInterface(); closeModals(); switchTab(cat);
        document.getElementById('headerCount').innerText = `${artworks.length} Works • Official Archive`;
    } catch (e) {
        alert("Storage Quota Exceeded! Phone images are too large. Please use URLs instead, or delete some items.");
    }
}

function deleteArt(id) {
    if(confirm("Are you sure you want to delete this artwork?")) {
        artworks = artworks.filter(a => a.id !== id);
        saveState(); buildInterface();
        document.getElementById('headerCount').innerText = `${artworks.length} Works • Official Archive`;
    }
}

function factoryReset() {
    if(confirm("WARNING: This will wipe all your custom changes and restore the default template. Continue?")) {
        localStorage.clear(); location.reload();
    }
}

function openLightbox(id) {
    const art = artworks.find(a => a.id === id); if(!art) return;
    document.getElementById('lightbox-img').src = art.src;
    document.getElementById('lightbox-title').innerText = art.title;
    document.getElementById('lightbox-category').innerText = art.desc || art.category;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
    setTimeout(() => document.getElementById('lightbox-img').src = '', 300);
}

function generateStars() {
    const sf = document.getElementById('starfield');
    for (let i = 0; i < 100; i++) {
        let s = document.createElement('div');
        s.className = 'star ' + (Math.random() > 0.9 ? 'golden' : 'bright');
        s.style.width = s.style.height = (Math.random()*3+1)+'px';
        s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
        s.style.setProperty('--duration', (Math.random()*4+2)+'s');
        s.style.setProperty('--opacity', Math.random()*0.5+0.2);
        sf.appendChild(s);
    }
}

init();
</script>
